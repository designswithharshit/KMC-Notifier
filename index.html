<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMC Notice Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>

        .header{
            background-color: var(--kmc-maroon);
            padding:20px;
            color:white;
            border-bottom:4px solid #d4af37;
        }

        .header-bar{
            display:flex;
            align-items:center;
            justify-content:space-between;
        }

        .header-left{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .header-left h1{
            font-size:24px;
            margin:0;
        }

        .kmc-logo{
            width:42px;
            height:42px;
            background:white;
            border-radius:50%;
            padding:3px;
        }

        .github-btn{
            background:white;
            color:#450000;
            padding:6px 10px;
            border-radius:4px;
            font-size:13px;
            text-decoration:none;
        }

        .github-btn:hover{
            background:#f0f0f0;
        }

        .note{
            margin-top:10px;
            font-size:12px;
            color:#777777;
            padding-left: 6%;
        }

        .github-link:hover{
            text-decoration:underline;
        }

        :root {
            --kmc-maroon: #450000;
            --kmc-bg: #FFFCF2;
            --text-main: #444444;
            --bs-red: #dc3545;
        }

        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Roboto', sans-serif;
            line-height: 1.5;
            font-weight: 400;
            background: var(--kmc-bg);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::selection { background: #b3d4fc; text-shadow: none; }
        .container { max-width: 900px; margin: 30px auto; background-color: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); overflow: hidden; }
        .header { background-color: var(--kmc-maroon); padding: 30px 20px; text-align: center; color: white; border-bottom: 4px solid #d4af37; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: 0.5px; }
        .btn-notify { background-color: white; color: var(--kmc-maroon); border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; font-family: 'Roboto', sans-serif; cursor: pointer; margin-top: 15px; transition: all 0.2s ease; }
        .btn-notify:hover { background-color: #f0f0f0; }
        .notice-list { padding: 30px 25px; }
        .card { margin-bottom: 30px; padding: 25px; border: 1px solid #eaeaea; border-radius: 6px; background-color: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.02); border-left: 4px solid var(--kmc-maroon); }
        .card-date { font-size: 12px; color: #777; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .card-title { font-size: 20px; margin: 0 0 15px 0; color: var(--kmc-maroon); line-height: 1.3; }
        .card-text { font-size: 15px; line-height: 1.6; color: var(--text-main); white-space: pre-line; }
        .card img { max-width: 100%; border-radius: 4px; margin-top: 15px; border: 1px solid #ddd; }
        .btn-pdf { background-color: var(--bs-red); color: white; text-decoration: none; padding: 8px 15px; border-radius: 4px; font-size: 13px; margin-right: 10px; margin-top: 10px; display: inline-block; font-weight: bold; }
        .btn-link { display: inline-block; color: var(--kmc-maroon); text-decoration: none; font-size: 14px; font-weight: bold; margin-top: 15px; }
        .btn-link:hover { text-decoration: underline; }

        .footer{
            margin-top:40px;
            padding:20px;
            text-align:center;
            font-size:14px;
            color:#666;
            border-top:1px solid #eee;
        }

       .footer-links a:not(:last-child)::after{
        content:" |";
        margin-left:10px;
        color:#aaa;
        }
        .footer-links a:hover{
            text-decoration:underline;
        }

    </style>
</head>
<body>

<div class="header">

    <div class="header-bar">

        <div class="header-left">
            <img src="https://kmc.du.ac.in/home/officelogo/colllogo_new.fw.png" class="kmc-logo">
            <h1>KMC Notice Board</h1>
        </div>
    </div>
</div>
    <div class="note">
        Note: This website is not affiliated with 
        <a href="https://kmc.du.ac.in" target="_blank">Kirori Mal College</a>. 
        All information displayed here is publicly available on the official college website.
    </div>
        <div class="notice-list" id="notices">
            <p style="text-align:center;">Loading latest notices...</p>
        </div>
    </div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

    let noticesArray = [];
    let visibleCount = 5;
        
    // 1. Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCoPs4FCINqAhX4EQ1k-kOzDCPLxHnFQNQ",
      authDomain: "kmc-notifier.firebaseapp.com",
      projectId: "kmc-notifier",
      storageBucket: "kmc-notifier.firebasestorage.app",
      messagingSenderId: "662736328747",
      appId: "1:662736328747:web:2bc93b40ae57971c85326e"
    };

    // Initialize Firebase safely
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const messaging = firebase.messaging();
    const db = firebase.firestore();

    // ---> THE MISSING PIECE: Catch notifications when the website is OPEN <---
    messaging.onMessage((payload) => {
        navigator.serviceWorker.ready.then(registration => {
            registration.showNotification(payload.data.title, {
                body: payload.data.body,
                icon: 'https://kmc.du.ac.in/home/officelogo/colllogo_new.fw.png',
                data: { url: payload.data.url }
            });
        });
    });

    // 2. Notification Subscription Logic
    function requestPermission() {
        const btn = document.getElementById('notifyBtn');
        btn.innerText = "Requesting...";
        
        Notification.requestPermission().then((permission) => {
            if (permission === 'granted') {
                
                navigator.serviceWorker.register('firebase-messaging-sw.js')
                .then((registration) => {
                
                const myVapidKey = "BNS5mDNvT2NybDFcHW6tPxR-MfEU8dvXVk8eDB_u9R-llA7a5nwGTFZkhHtmYqAloLaf-B9Ukhl5LG-K4wOYbto";
                
                return messaging.getToken({
                    vapidKey: myVapidKey,
                    serviceWorkerRegistration: registration
                });
                    
                }).then((currentToken) => {
                    if (currentToken) {
                        db.collection('tokens').doc(currentToken).set({
                            token: currentToken,
                            created: Date.now()
                        })
                        .then(() => {
                            btn.innerText = "✅ Notifications Enabled!";
                            btn.style.backgroundColor = "#28a745";
                            btn.style.color = "white";
                        });
                    }
                }).catch((err) => {
                    alert("TOKEN ERROR: " + err.message);
                    console.error('Error getting token', err);
                    btn.innerText = "❌ Error. Try Again.";
                });
            } else {
                btn.innerText = "🔕 Notifications Blocked";
            }
        });
    }
    // 3. Load Notices from JSON
    fetch('notices.json')
        .then(response => response.json())
        .then(data => {
            noticesArray = Object.values(data).sort(
                (a, b) => new Date(b.discovered_on) - new Date(a.discovered_on)
            );

            renderNotices();

            const params = new URLSearchParams(window.location.search);
            const noticeLink = params.get("notice");

            if (noticeLink) {
                setTimeout(() => {
                    const noticeElement = document.querySelector(`a[href="${noticeLink}"]`);
                    if (noticeElement) {
                        noticeElement.scrollIntoView({ behavior: "smooth" });
                    }
                }, 500);
            }
        })
        .catch(() => {
            document.getElementById('notices').innerHTML =
                '<p style="text-align:center;">Updates arriving soon...</p>';
        });

    function renderNotices() {

        const container = document.getElementById('notices');
        container.innerHTML = '';

        const visible = noticesArray.slice(0, visibleCount);

        visible.forEach(notice => {

            let pdfButtons = '';
            if (notice.pdfs) {
                notice.pdfs.forEach(url => {
                    pdfButtons += `<a href="${url}" class="btn-pdf" target="_blank">📄 Download PDF</a>`;
                });
            }

            let imagesHtml = '';
            if (notice.images) {
                notice.images.forEach(src => {
                    imagesHtml += `<img src="${src}">`;
                });
            }

            container.innerHTML += `
            <div class="card">
                <div class="card-date">📅 ${notice.date || 'Recent'}</div>
                <h3 class="card-title">${notice.title}</h3>

                <div class="card-text">
                    ${notice.text}
                </div>

                ${imagesHtml}

                <div style="margin-top:20px;padding-top:10px;">
                    ${pdfButtons}
                    <a href="${notice.link}" class="btn-link" target="_blank">Official Link â†’</a>
                </div>
            </div>
            `;
        });

        if (visibleCount < noticesArray.length) {
            container.innerHTML += `
            <div style="text-align:center;margin-top:20px;">
                <button onclick="loadMore()">Load More</button>
            </div>`;
        }

    }

    function loadMore() {
        visibleCount += 5;
        renderNotices();
    }

</script>
