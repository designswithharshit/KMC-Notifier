<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMC Notice Board</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f5f7; margin: 0; padding: 20px 10px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background-color: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { background-color: #ff6b00; padding: 30px 20px; text-align: center; color: white; }
        .header h1 { margin: 0; font-size: 28px; }
        .btn-notify { background-color: #1a1a1a; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .notice-list { padding: 20px; }
        .card { margin-bottom: 20px; padding: 20px; border: 1px solid #eee; border-radius: 8px; background-color: #fafafa; }
        .card-date { font-size: 12px; color: #ff6b00; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .card-title { font-size: 18px; margin: 0 0 10px 0; }
        .card a { display: inline-block; background-color: #ff6b00; color: white; text-decoration: none; padding: 8px 15px; border-radius: 4px; font-size: 13px; margin-top: 10px; font-weight: bold;}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📢 KMC Notice Board</h1>
        <button class="btn-notify" id="notifyBtn" onclick="requestPermission()">🔔 Get Push Notifications</button>
    </div>
    <div class="notice-list" id="notices">
        <p style="text-align:center;">Loading latest notices...</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCoPs4FCINqAhX4EQ1k-kOzDCPLxHnFQNQ",
      authDomain: "kmc-notifier.firebaseapp.com",
      projectId: "kmc-notifier",
      storageBucket: "kmc-notifier.firebasestorage.app",
      messagingSenderId: "662736328747",
      appId: "1:662736328747:web:2bc93b40ae57971c85326e"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();
    const db = firebase.firestore();

    // Notification Subscription Logic
    function requestPermission() {
        const btn = document.getElementById('notifyBtn');
        btn.innerText = "Requesting...";
        
        Notification.requestPermission().then((permission) => {
            if (permission === 'granted') {
                
                // IMPORTANT: PASTE YOUR VAPID KEY INSIDE THESE QUOTES
                messaging.getToken({ vapidKey: "PASTE_YOUR_VAPID_KEY_HERE" })
                .then((currentToken) => {
                    if (currentToken) {
                        // Save token to Firestore
                        db.collection('tokens').doc(currentToken).set({ token: currentToken })
                        .then(() => {
                            btn.innerText = "✅ Notifications Enabled!";
                            btn.style.backgroundColor = "#28a745";
                        });
                    }
                }).catch((err) => {
                    console.log('Error getting token', err);
                    btn.innerText = "❌ Error. Try Again.";
                });
            } else {
                btn.innerText = "🔕 Notifications Blocked";
            }
        });
    }

    // Load Notices from JSON
    fetch('notices.json')
    .then(response => response.json())
    .then(data => {
        const container = document.getElementById('notices');
        container.innerHTML = ''; // Clear loading text
        
        // Convert JSON object to array and sort by date
        const sortedNotices = Object.values(data).sort((a, b) => new Date(b.discovered_on) - new Date(a.discovered_on));
        
        sortedNotices.forEach(notice => {
            container.innerHTML += `
                <div class="card">
                    <div class="card-date">Discovered: ${notice.discovered_on}</div>
                    <h3 class="card-title">${notice.title}</h3>
                    <a href="${notice.link}" target="_blank">View Full Notice &rarr;</a>
                </div>
            `;
        });
    }).catch(err => {
        document.getElementById('notices').innerHTML = '<p style="text-align:center;">No notices found yet. The scraper will generate them soon!</p>';
    });
</script>

</body>
</html>
